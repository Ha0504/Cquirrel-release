; Local 15% config for a larger input stream.

[DEFAULT]
DataFilePath = .
WindowSize = 900000
ScaleFactor = 0.15

isLineitem = yes
isOrders = yes
isCustomer = yes
isPartSupp = yes
isPart = yes
isSupplier = yes
isNation = yes
isRegion = yes

OutputFileName = input_data_15pct_insert_only.csv

[KAFKA_CONF]
KafkaEnable = no
BootstrapServer = localhost:9092
KafkaTopic = aju_data_generator
