; Local smoke-test config for a small input stream.

[DEFAULT]
DataFilePath = .
WindowSize = 6000
ScaleFactor = 0.001

isLineitem = yes
isOrders = yes
isCustomer = yes
isPartSupp = yes
isPart = yes
isSupplier = yes
isNation = yes
isRegion = yes

OutputFileName = input_data_smoke_insert_only.csv

[KAFKA_CONF]
KafkaEnable = no
BootstrapServer = localhost:9092
KafkaTopic = aju_data_generator
